name = "bridge-gemini-proxy"
main = "src/index.ts"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ALLOWED_ORIGINS = "http://localhost:5173,http://localhost:8787,https://production-studio-gamma.vercel.app"
RATE_LIMIT_RPM = "10"
LOG_LEVEL = "info"

# Descomentar y poblar después de `wrangler kv:namespace create "RATE_LIMIT_KV"`
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "REEMPLAZAR_CON_ID_REAL"
